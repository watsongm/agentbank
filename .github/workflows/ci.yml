name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: frontend (vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build

  backend:
    name: backend (typecheck + build + smoke)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentbank
          POSTGRES_PASSWORD: agentbank
          POSTGRES_DB: agentbank_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentbank"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://agentbank:agentbank@localhost:5432/agentbank_test?schema=public
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm run build
      # No migration files yet (Tier 1 still iterating on the schema), so push
      # the schema straight into the test DB instead of migrate deploy.
      - run: npx prisma db push --accept-data-loss --skip-generate
      - run: npm run db:seed
      - run: npm test --if-present

  mcp-server:
    name: mcp-server (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4
      # No lockfile yet — install is fast (one dep), so skip npm cache.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - run: node --check index.js
