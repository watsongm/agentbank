name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-ci:
    name: Backend — typecheck + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: agentbank
          POSTGRES_PASSWORD: agentbank
          POSTGRES_DB: agentbank_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentbank"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://agentbank:agentbank@localhost:5432/agentbank_test?schema=public
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache backend node_modules
        uses: actions/cache@v4
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-

      - run: npm ci

      - run: npx prisma generate

      - name: Type-check
        run: npm run type-check

      - name: Push schema to test DB
        run: npx prisma db push --accept-data-loss --skip-generate

      - name: Seed test DB
        run: npm run db:seed

      - name: Run tests
        run: npm test

  frontend-ci:
    name: Frontend — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-root-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-root-

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build
