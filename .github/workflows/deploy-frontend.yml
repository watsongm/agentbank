# ─────────────────────────────────────────────────────────────────────────────
# deploy-frontend.yml — Builds the Vite frontend and deploys to Cloudflare Pages
#
# SETUP — add these two secrets in your GitHub repo:
#   Settings → Secrets and variables → Actions → New repository secret
#
#   CLOUDFLARE_API_TOKEN  — a Cloudflare API token with "Cloudflare Pages: Edit"
#                           permission.  Generate one at:
#                           https://dash.cloudflare.com/profile/api-tokens
#
#   CLOUDFLARE_ACCOUNT_ID — your Cloudflare account ID, found in the right-hand
#                           sidebar of any Cloudflare dashboard page or at:
#                           https://dash.cloudflare.com → your account → Account ID
#
# The `project-name` below ("agentbank") must match the Cloudflare Pages project
# name.  If the project does not exist yet, the first deploy will create it.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-root-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-root-

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

