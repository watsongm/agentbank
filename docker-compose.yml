version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agentbank
      POSTGRES_PASSWORD: agentbank
      POSTGRES_DB: agentbank
    ports:
      - "5432:5432"
    volumes:
      - agentbank_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentbank"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://agentbank:agentbank@postgres:5432/agentbank?schema=public
      PORT: "3000"
      HOST: "0.0.0.0"
      LOG_LEVEL: info
      DEMO_MODE: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  agentbank_pg:
